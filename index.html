<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | روبن هود</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #ff9800;
            --bg: #0b0f19;
            --card: #161e2e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .main-container {
            max-width: 900px;
            width: 95%;
            margin: 10px auto;
            text-align: center;
        }

        .video-display-area {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--primary);
            margin: 15px 0;
            display: none; /* يظهر عند النقر على حلقة */
        }

        .responsive-iframe {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .responsive-iframe iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-top: 10px;
        }

        .ep-btn {
            background: #252f44;
            color: white;
            border: none;
            padding: 15px 0;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .ep-btn:hover { background: var(--primary); }
        .ep-btn.active { background: var(--accent); color: black; }

        h2, h3 { margin: 10px 0; }
    </style>
</head>
<body onload="loadEpisodes()">

<header>

</header>

    <div class="video-display-area" id="player-section">
        <div class="responsive-iframe">

    <h3 id="ep-indicator">اختر رقم الحلقة للمشاهدة:</h3>

</div>

    ];

    function loadEpisodes() {
        const list = document.getElementById('episodes-list');
        list.innerHTML = '';

        robinLinks.forEach((link, index) => {
            const btn = document.createElement('button');
            btn.className = 'ep-btn';
            btn.innerText = index + 1;
            btn.onclick = () => {
                if(link === "EMPTY") {
                    alert("الحلقة غير متوفرة حالياً");
                    return;
                }

                // فتح رابط الإعلان في صفحة جديدة
                window.open(adLink, '_blank');

                // عرض الفيديو
                document.getElementById('player-section').style.display = 'block';
                document.getElementById('main-player').src = link;
                document.getElementById('ep-indicator').innerText = "أنت تشاهد الآن الحلقة: " + (index + 1);
                
                // تمييز الزر النشط
                document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // الانتقال للفيديو بسلاسة
                document.getElementById('player-section').scrollIntoView({ behavior: 'smooth' });
            };
            list.appendChild(btn);
        });
    }
</script>
</body>
</html>
